name: dsl_flutter
version: 1.0.0
description: A clean DSL for Flutter that eliminates bracket nesting with indentation-based syntax. Reduce code by 60%+.
homepage: https://github.com/myopz/dsl-flutter
repository: https://github.com/myopz/dsl-flutter
issue_tracker: https://github.com/myopz/dsl-flutter/issues

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  build: ^2.4.0
  source_gen: ^1.4.0
  analyzer: ^6.4.0
  dart_style: ^2.3.0
  path: ^1.9.0
  args: ^2.4.2
  ansicolor: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  test: ^1.24.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

executables:
  dsl_flutter: dsl_flutter

topics:
  - dsl
  - flutter
  - code-generation
  - widget
  - productivity

